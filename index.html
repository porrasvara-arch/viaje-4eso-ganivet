<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Viaje 4º ESO 2026</title>

    <link rel="stylesheet" href="Estilos.css">

</head>

<body>

<header>

    <h1>🚌 Viaje 4º ESO 2026</h1>

    <p>Control de asistencia</p>

</header>

<div class="contenedor">

    <div class="menu">

        <button onclick="mostrarTodos()">
            👥 Todos
        </button>

        <button onclick="soloPresentes()">
            ✅ Presentes
        </button>

        <button onclick="soloAusentes()">
            ❌ Ausentes
        </button>

        <button onclick="ordenHabitacion()">
            🏨 Habitaciones
        </button>

        <button class="btn-pasarlista" onclick="iniciarPaseLista()">
            📝 PASAR LISTA
        </button>

    </div>

    <input
        id="buscar"
        type="text"
        placeholder="🔍 Buscar alumno...">

    <div class="estadisticas">

        <div class="caja">
            <h2 id="totalAlumnos">0</h2>
            <span>Total</span>
        </div>

        <div class="caja verde">
            <h2 id="presentes">0</h2>
            <span>Presentes</span>
        </div>

        <div class="caja roja">
            <h2 id="ausentes">0</h2>
            <span>Ausentes</span>
        </div>

    </div>

    <div id="paseLista" style="display:none;">

        <div class="tarjeta">

            <h1 id="nombrePase"></h1>

            <h2 id="habitacionPase"></h2>

            <button
                style="width:100%;height:70px;font-size:28px;background:#2ecc71;color:white;margin-top:20px;border:none;border-radius:10px;"
                onclick="marcarPresente()">

                ✅ PRESENTE

            </button>

            <button
                style="width:100%;height:70px;font-size:28px;background:#e74c3c;color:white;margin-top:20px;border:none;border-radius:10px;"
                onclick="marcarAusente()">

                ❌ AUSENTE

            </button>

            <h2 id="progreso"></h2>

        </div>

    </div>

    <div id="lista"></div>

</div>

<script src="datos.js"></script>
<script src="app.js"></script>

</body>

</html>
